{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Easy Transport</title>
    <style>
        :root, [data-theme="dark"] { --bg:#0f0f1a; --card:#1a1a2e; --input:#252538; --border:rgba(255,255,255,0.1); --text:#fff; --muted:#8b8b9e; --accent:#ff4757; }
        [data-theme="light"] { --bg:#f0f2f5; --card:#fff; --input:#f3f4f6; --border:rgba(0,0,0,0.1); --text:#1f2937; --muted:#6b7280; --accent:#ef4444; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family:sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; transition:background 0.3s; }
        .container { background:var(--card); border:1px solid var(--border); padding:40px; border-radius:16px; width:100%; max-width:400px; position:relative; }
        .toggle { position:absolute; top:15px; right:15px; background:var(--input); border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .toggle svg { width:18px; height:18px; fill:var(--text); }
        h2 { text-align:center; margin-bottom:20px; }
        input { width:100%; padding:12px; margin:8px 0; background:var(--input); border:1px solid var(--border); border-radius:8px; color:var(--text); }
        button.submit { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px; margin-top:10px; cursor:pointer; font-weight:bold; }
        .msg { padding:10px; margin:10px 0; border-radius:8px; text-align:center; display:none; font-size:14px; }
        .msg.error { background:rgba(255,71,87,0.2); color:#ff4757; }
        .msg.success { background:rgba(0,200,150,0.2); color:#00c896; }
    </style>
</head>
<body>
    <div class="container">
        <button class="toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
            <svg id="icon-sun" style="display:none" viewBox="0 0 24 24"><path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"/></svg>
            <svg id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <h2>Welcome Back</h2>
        <div id="msg" class="msg"></div>
        <form id="loginForm">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Email or Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="submit">Login</button>
        </form>
    </div>
    <script>
        const toggleBtn = document.querySelector('.toggle');
        const sun = document.getElementById('icon-sun');
        const moon = document.getElementById('icon-moon');
        const html = document.documentElement;
        const saved = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', saved);
        sun.style.display = saved === 'dark' ? 'block' : 'none';
        moon.style.display = saved === 'light' ? 'block' : 'none';

        function toggleTheme() {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            sun.style.display = next === 'dark' ? 'block' : 'none';
            moon.style.display = next === 'light' ? 'block' : 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const data = new FormData(form);
            data.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
            const btn = form.querySelector('.submit');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch('/api/login/', { method:'POST', body:data, headers:{'X-Requested-With':'XMLHttpRequest'} });
                const json = await res.json();
                const msg = document.getElementById('msg');
                
                if(json.success) {
                    msg.textContent = json.message || 'Login successful!';
                    msg.className = 'msg success';
                    msg.style.display = 'block';
                    setTimeout(() => {
                        // ✅ Use server redirect_url (preferred)
                        if (json.redirect_url) {
                            window.location.href = json.redirect_url;
                        } else {
                            // ✅ Fallback redirect
                            window.location.href = '/dashboard/';
                        }
                    }, 500);
                } else {
                    msg.textContent = json.message || 'Invalid credentials';
                    msg.className = 'msg error';
                    msg.style.display = 'block';
                }
            } catch(err) {
                console.error('Login error:', err);
                document.getElementById('msg').textContent = 'Connection failed';
                document.getElementById('msg').className = 'msg error';
                document.getElementById('msg').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
