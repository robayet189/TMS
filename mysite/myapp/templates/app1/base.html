{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding for proper text display -->
    <meta charset="UTF-8">
    <!-- Responsive design viewport settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Dynamic page title with block override support -->
    <title>Easy Transport — {% block title %}Dashboard{% endblock %}</title>
    
    <!-- Google Fonts preconnect for performance optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Load DM Sans and Alegreya SC fonts from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Alegreya+SC:wght@700&display=swap" rel="stylesheet">
    
    <!-- CSS Styles - Theme variables and layout definitions -->
    <style>
        /* Reset default browser styles for consistent cross-browser rendering */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Light mode theme variables (default) */
        :root {
            --bg-deep: #f9fafc; --bg-sidebar: #ffffff; --bg-card: #ffffff;
            --border: rgba(0, 0, 0, 0.08); --border-faint: rgba(0, 0, 0, 0.05);
            --text: #1e293b; --text-muted: #5b6e8c; --text-dim: #8c9bb0;
            --yellow: #e63946; --orange: #f4a261; --amber: #f4a261;
            --cyan: #00b4d8; --green: #2b9348; --red: #e63946; --gold: #f4a261;
            --sidebar-w: 260px; --topbar-h: 68px;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.02);
            --accent-glow: rgba(230, 57, 70, 0.08);
        }

        /* Dark mode theme variables - overrides light mode */
        body.dark {
            --bg-deep: #0b0b14; --bg-sidebar: #13131f; --bg-card: #1a1a2e;
            --border: rgba(255, 255, 255, 0.07); --border-faint: rgba(255, 255, 255, 0.05);
            --text: #ffffff; --text-muted: #a09ab8; --text-dim: #5a5470;
            --yellow: #ff4757; --orange: #ff6b35; --amber: #ff6b35;
            --cyan: #00d4ff; --green: #4ade80; --red: #ff4757; --gold: #f59e0b;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.4);
            --accent-glow: rgba(255, 71, 87, 0.12);
        }

        /* Base body styles with theme transition support */
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.2s ease;
        }

        /* Custom scrollbar styling for better UX */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }

        /* Sidebar navigation styles */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--bg-sidebar);
            border-right: 0.8px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            transition: background 0.3s ease;
        }

        .sidebar-logo {
            height: var(--topbar-h);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 10px;
        }

        .logo-box {
            width: 45px; height: 45px;
            background: transparent;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-box img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }

        .logo-text {
            font-family: 'Alegreya SC', serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--red);
        }

        .nav {
            flex: 1;
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 42px;
            padding: 0 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            color: var(--text-dim);
            transition: color .15s, background .15s;
        }
        .nav a:hover { color: var(--text-muted); background: rgba(0,0,0,0.04); }
        body.dark .nav a:hover { background: rgba(255,255,255,0.04); }
        .nav a.active {
            color: var(--text);
            border: 1px solid var(--yellow);
            border-radius: 4px;
            box-shadow: 0 0 3px rgba(230,57,70,.4), 0 0 6px rgba(230,57,70,.2);
        }
        .nav a svg { width: 17px; height: 17px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; }

        .sidebar-footer {
            border-top: 0.8px solid var(--border-faint);
            padding: 16px 24px;
        }
        .logout-link {
            display: flex; align-items: center; gap: 10px;
            color: var(--amber);
            font-size: 14px;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .logout-link svg { width: 16px; height: 16px; }

        /* Main content area styles */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top navigation bar styles */
        .topbar {
            height: var(--topbar-h);
            background: rgba(249, 250, 252, 0.92);
            backdrop-filter: blur(18px);
            border-bottom: 0.8px solid var(--border);
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            transition: background 0.3s ease;
        }
        body.dark .topbar {
            background: rgba(11, 11, 20, 0.92);
        }

        .topbar h1 { font-size: 18px; font-weight: 600; }

        .topbar-right { display: flex; align-items: center; gap: 16px; }

        .notif { position: relative; cursor: pointer; }
        .notif svg { width: 20px; height: 20px; color: var(--text-muted); }
        .notif-dot {
            position: absolute; top: -3px; right: -2px;
            width: 9px; height: 9px;
            background: var(--red); border-radius: 50%;
        }

        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(180deg, var(--red), var(--orange));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; color: #ffffff;
            border: 1.5px solid rgba(255,255,255,0.7);
            cursor: pointer;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--red);
        }

        /* Main content padding and layout */
        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Statistics cards grid layout */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-icon {
            width: 44px; height: 44px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .stat-icon svg { width: 20px; height: 20px; }
        .stat-icon.cyan  { background: rgba(0,180,216,.08); color: var(--cyan); }
        .stat-icon.red   { background: rgba(230,57,70,.08); color: var(--red); }
        .stat-icon.green { background: rgba(43,147,72,.08); color: var(--green); }
        .stat-icon.amber { background: rgba(244,162,97,.08); color: var(--gold); }

        .stat-label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .pill {
            display: inline-block;
            font-size: 11px; font-weight: 600;
            padding: 2px 8px; border-radius: 999px;
        }
        .pill.green { background: rgba(43,147,72,.12); color: var(--green); }

        .next-trip-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-left: 4px solid var(--red);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            transition: background 0.3s ease;
        }

        .no-trip-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            text-align: center;
            color: var(--text-dim);
            font-size: 15px;
        }
        .no-trip-card strong { display: block; color: var(--text-muted); font-size: 17px; margin-bottom: 6px; }

        .trip-meta-label { font-size: 13px; color: var(--text-dim); letter-spacing: .5px; margin-bottom: 10px; }
        .trip-route { font-size: 22px; font-weight: 600; margin-bottom: 12px; }

        .trip-meta-row { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; margin-bottom: 14px; }
        .trip-meta-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-muted); }
        .trip-meta-item svg { width: 14px; height: 14px; flex-shrink: 0; }
        .trip-meta-item strong { color: var(--text); font-weight: 700; }

        .trip-status-row { display: flex; align-items: center; gap: 10px; }

        .status-pill {
            display: inline-block;
            font-size: 12px; font-weight: 600;
            padding: 4px 12px; border-radius: 999px;
        }
        .status-pill.amber  { background: rgba(244,162,97,.12); color: var(--gold); }
        .status-pill.green  { background: rgba(43,147,72,.12); color: var(--green); }
        .status-pill.red    { background: rgba(230,57,70,.12); color: var(--red); }
        .status-pill.gray   { background: rgba(107,114,128,.12); color: #6b7280; }

        .driver-text { font-size: 13px; color: var(--text-dim); }

        .track-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 22px;
            background: transparent;
            border: 1px solid var(--red);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 600;
            border-radius: 4px; cursor: pointer; white-space: nowrap;
            box-shadow: 0 0 4px rgba(230,57,70,.3), 0 0 8px rgba(230,57,70,.15);
            text-decoration: none;
            transition: box-shadow .2s;
            flex-shrink: 0;
        }
        .track-btn:hover { box-shadow: 0 0 8px rgba(230,57,70,.6), 0 0 14px rgba(230,57,70,.3); }
        .track-btn svg { width: 15px; height: 15px; color: var(--red); }

        .card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: background 0.3s ease;
        }

        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

        .bookings-table { width: 100%; border-collapse: collapse; }
        .bookings-table th {
            text-align: left;
            font-size: 14px; font-weight: 500;
            color: var(--text-dim);
            padding-bottom: 12px;
        }
        .bookings-table td {
            font-size: 14px;
            padding: 12px 0;
            border-top: 0.8px solid var(--border-faint);
            vertical-align: middle;
        }
        .bookings-table td.date  { color: var(--text-muted); width: 110px; }
        .bookings-table td.seat  { color: var(--text-muted); width: 90px; }
        .bookings-table td.route { color: var(--text); }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .action-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 22px 16px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: border-color .2s, transform .15s, background 0.3s ease;
        }
        .action-card:hover { border-color: rgba(230,57,70,.4); transform: translateY(-2px); }

        .action-icon {
            width: 44px; height: 44px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .action-icon svg { width: 20px; height: 20px; }
        .action-icon.red   { background: rgba(230,57,70,.08); color: var(--red); }
        .action-icon.cyan  { background: rgba(0,180,216,.08); color: var(--cyan); }
        .action-icon.green { background: rgba(43,147,72,.08); color: var(--green); }
        .action-icon.amber { background: rgba(244,162,97,.08); color: var(--gold); }

        .action-label { font-size: 14px; font-weight: 500; color: var(--text); text-align: center; }

        .routes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .route-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: transform .2s, background 0.3s ease;
        }
        .route-card:hover { transform: translateY(-2px); border-color: rgba(230,57,70,.3); }

        .route-code {
            font-size: 20px;
            font-weight: 700;
            color: var(--red);
            margin-bottom: 8px;
        }
        .route-path {
            font-size: 15px;
            color: var(--text);
            margin-bottom: 12px;
        }
        .route-time {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .btn-book {
            display: inline-block;
            padding: 8px 20px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .2s;
        }
        .btn-book:hover { opacity: 0.85; }

        .empty-row td {
            text-align: center;
            color: var(--text-dim);
            padding: 24px 0;
        }

        .filters-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .filters-bar input, .filters-bar select {
            padding: 10px 16px;
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }

        .emergency-list {
            list-style: none;
            padding: 0;
        }
        .emergency-list li {
            padding: 12px;
            background: rgba(230,57,70,.1);
            margin-bottom: 10px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
        }
        body.dark .emergency-list li {
            background: rgba(255,71,87,.15);
        }

        /* Responsive design breakpoints */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .actions-grid { grid-template-columns: repeat(2, 1fr); }
            .topbar h1 { font-size: 14px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .actions-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Sidebar navigation component -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-box">
            <!-- Application logo image loaded from static files -->
            <img src="{% static 'app1/logo.png' %}" alt="logo" style="width:100%; height:100%; object-fit:contain;">
        </div>
        <span class="logo-text">Easy Transport</span>
    </div>

    <!-- Main navigation menu with SPA links -->
    <nav class="nav">
        <!-- Dashboard link with data-url attribute for SPA navigation -->
        <a href="{% url 'dashboard' %}" data-url="{% url 'dashboard' %}">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <!-- Schedule link -->
        <a href="{% url 'schedule' %}" data-url="{% url 'schedule' %}">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Schedule
        </a>
        <!-- Track Bus link -->
        <a href="{% url 'track_bus' %}" data-url="{% url 'track_bus' %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9L18 10l-2-6H8l-2 6-2.5.1C2.7 10.3 2 11.1 2 12v3c0 .6.4 1 1 1h2"/>
                <circle cx="7" cy="17" r="2"/>
                <circle cx="17" cy="17" r="2"/>
            </svg>
            Track Bus
        </a>
        <!-- Profile link -->
        <a href="{% url 'profile' %}" data-url="{% url 'profile' %}">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profile
        </a>
    </nav>

    <!-- Sidebar footer with logout button -->
    <div class="sidebar-footer">
        <form action="{% url 'logout' %}" method="post" id="logoutForm">
            {% csrf_token %}
            <button type="submit" class="logout-link">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </button>
        </form>
    </div>
</aside>

<!-- Main content area with topbar and dynamic content -->
<main class="main">
    <header class="topbar">
        <h1>{% block topbar_title %}Dashboard{% endblock %}</h1>
        <div class="topbar-right">
            <!-- Notification bell icon -->
            <div class="notif">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                <div class="notif-dot"></div>
            </div>
            <!-- Theme toggle button for dark/light mode -->
            <div class="theme-toggle" id="themeToggle">🌙</div>
            <!-- User avatar with first letter of name -->
            <div class="avatar">{{ request.user.first_name|first|upper }}</div>
        </div>
    </header>

    <!-- Dynamic content area - loaded via SPA navigation or full page load -->
    <div id="main-content" class="content">
        {% block content %}
        {% endblock %}
    </div>
</main>

<!-- JavaScript for SPA navigation, theme toggle, and dynamic content loading -->
<script>
    // ========================================================================
    // CSRF TOKEN HELPER FUNCTION
    // Retrieves CSRF token from browser cookies for AJAX requests
    // ========================================================================
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // ========================================================================
    // THEME TOGGLE FUNCTIONALITY
    // Handles switching between light and dark mode with localStorage persistence
    // ========================================================================
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    // Load saved theme preference from localStorage or default to light mode
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
        body.classList.add('dark');
        themeToggle.textContent = '☀️';
    } else {
        themeToggle.textContent = '🌙';
    }

    // Toggle theme on button click and save preference
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ========================================================================
    // ✅ FIXED: SPA NAVIGATION WITH PROPER INITIAL LOAD HANDLING
    // Handles navigation between pages without full page reload
    // Ensures data loads correctly on first visit AND AJAX navigation
    // ========================================================================
    document.addEventListener('DOMContentLoaded', function() {
        const navLinks = document.querySelectorAll('.nav a');
        const contentDiv = document.getElementById('main-content');

        /**
         * Load page content via AJAX fetch with proper error handling
         * @param {string} url - The URL to fetch content from
         * @param {boolean} pushState - Whether to update browser history
         */
        async function loadPage(url, pushState = true) {
            try {
                // Show loading indicator while fetching content
                contentDiv.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-dim);">Loading...</div>';
                
                // Fetch content with proper headers for Django CSRF and session handling
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 
                        'X-Requested-With': 'XMLHttpRequest',  // Mark as AJAX request
                        'Accept': 'text/html, */*; q=0.01'      // Accept HTML response
                    },
                    credentials: 'same-origin'  // ✅ CRITICAL: Include session cookies for authentication
                });
                
                // Handle HTTP errors (401 Unauthorized, 403 Forbidden, etc.)
                if (!response.ok) {
                    // Redirect to login if user is not authenticated
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '/login/?next=' + encodeURIComponent(url);
                        return;
                    }
                    throw new Error('Network error: ' + response.status);
                }
                
                // Parse HTML response and extract main content
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newContent = doc.getElementById('main-content');
                
                // Update page content with fetched data
                if (newContent) {
                    contentDiv.innerHTML = newContent.innerHTML;
                } else {
                    // Fallback: full page load if content extraction fails
                    window.location.href = url;
                    return;
                }
                
                // Update browser history for back/forward button support
                if (pushState) {
                    history.pushState({ url: url }, '', url);
                }
                
                // Update active navigation link styling
                updateActiveLink(url);
                
                // Re-initialize page-specific scripts and event listeners
                initPageScripts();
                
            } catch (error) {
                console.error('Navigation error:', error);
                // Fallback to full page load on any error
                window.location.href = url;
            }
        }

        /**
         * Update active navigation link based on current URL
         * @param {string} currentUrl - The current page URL
         */
        function updateActiveLink(currentUrl) {
            const currentPath = new URL(currentUrl, window.location.origin).pathname;
            navLinks.forEach(link => {
                const linkPath = new URL(link.href, window.location.origin).pathname;
                if (linkPath === currentPath) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        /**
         * Initialize page-specific scripts and event listeners
         * Called after content is loaded via AJAX
         */
        function initPageScripts() {
            // Re-attach event listeners for profile edit buttons if they exist
            const editBtn = document.getElementById('editProfileBtn');
            if (editBtn) {
                editBtn.onclick = function(e) {
                    e.preventDefault();
                    const profileCard = document.getElementById('profileCard');
                    const editForm = document.getElementById('editFormCard');
                    if (profileCard) profileCard.style.display = 'none';
                    if (editForm) {
                        editForm.style.display = 'block';
                        editForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                };
            }
            const cancelBtn = document.getElementById('cancelEditBtn');
            if (cancelBtn) {
                cancelBtn.onclick = function(e) {
                    e.preventDefault();
                    const profileCard = document.getElementById('profileCard');
                    const editForm = document.getElementById('editFormCard');
                    if (editForm) editForm.style.display = 'none';
                    if (profileCard) profileCard.style.display = 'flex';
                };
            }
        }

        // Attach click handlers to all navigation links for SPA behavior
        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();  // Prevent default full page navigation
                const url = this.href;
                loadPage(url, true);  // Load content via AJAX
            });
        });

        // Handle browser back/forward button navigation
        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.url) {
                loadPage(event.state.url, false);  // Load without updating history
            } else {
                loadPage(window.location.pathname, false);
            }
        });

        // ✅ FIXED: Initialize on first page load
        // This ensures dashboard data loads correctly when user arrives via login redirect
        updateActiveLink(window.location.href);
        initPageScripts();
        
        // ✅ CRITICAL: If page was loaded via redirect (not SPA navigation), 
        // trigger a data refresh to ensure bookings/schedule are visible immediately
        // This solves the "need to refresh to see data" problem
        const isInitialLoad = !window.history.state || !window.history.state.url;
        if (isInitialLoad && window.location.pathname === '/dashboard/') {
            // Small delay to ensure DOM is fully ready
            setTimeout(() => {
                // Check if bookings container exists but is empty
                const bookingsContainer = document.querySelector('.bookings-table tbody');
                if (bookingsContainer && bookingsContainer.children.length === 0) {
                    // If empty, reload the page to fetch fresh data from server
                    // This is a fallback for edge cases where initial load fails
                    window.location.reload();
                }
            }, 500);
        }
    });
</script>
</body>
</html>
