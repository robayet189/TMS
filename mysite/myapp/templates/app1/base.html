{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Route — Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Alegreya+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ===== THEME VARIABLES (Light Mode Default) ===== */
        :root {
            --bg-deep:      #f9fafc;
            --bg-sidebar:   #ffffff;
            --bg-card:      #ffffff;
            --border:       rgba(0, 0, 0, 0.08);
            --border-faint: rgba(0, 0, 0, 0.05);
            --text:         #1e293b;
            --text-muted:   #5b6e8c;
            --text-dim:     #8c9bb0;
            --yellow:       #e63946;
            --orange:       #f4a261;
            --amber:        #f4a261;
            --cyan:         #00b4d8;
            --green:        #2b9348;
            --red:          #e63946;
            --gold:         #f4a261;
            --sidebar-w:    260px;
            --topbar-h:     68px;
            --shadow-sm:    0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
            --shadow-md:    0 12px 28px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.02);
            --accent-glow:  rgba(230, 57, 70, 0.08);
        }

        /* Dark Mode */
        body.dark {
            --bg-deep:      #0b0b14;
            --bg-sidebar:   #13131f;
            --bg-card:      #1a1a2e;
            --border:       rgba(255, 255, 255, 0.07);
            --border-faint: rgba(255, 255, 255, 0.05);
            --text:         #ffffff;
            --text-muted:   #a09ab8;
            --text-dim:     #5a5470;
            --yellow:       #ff4757;
            --orange:       #ff6b35;
            --amber:        #ff6b35;
            --cyan:         #00d4ff;
            --green:        #4ade80;
            --red:          #ff4757;
            --gold:         #f59e0b;
            --shadow-sm:    0 8px 20px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(0, 0, 0, 0.2);
            --shadow-md:    0 12px 28px rgba(0, 0, 0, 0.4);
            --accent-glow:  rgba(255, 71, 87, 0.12);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.2s ease;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--bg-sidebar);
            border-right: 0.8px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            transition: background 0.3s ease;
        }

        .sidebar-logo {
            height: var(--topbar-h);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 10px;
        }

        .logo-box {
            width: 45px; height: 45px;
            background: transparent;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .logo-text {
            font-family: 'Alegreya SC', serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--red);
        }

        .nav {
            flex: 1;
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 42px;
            padding: 0 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            color: var(--text-dim);
            transition: color .15s, background .15s;
        }
        .nav a:hover { color: var(--text-muted); background: rgba(0,0,0,0.04); }
        body.dark .nav a:hover { background: rgba(255,255,255,0.04); }
        .nav a.active {
            color: var(--text);
            border: 1px solid var(--yellow);
            border-radius: 4px;
            box-shadow: 0 0 3px rgba(230,57,70,.4), 0 0 6px rgba(230,57,70,.2);
        }
        .nav a svg { width: 17px; height: 17px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; }

        .sidebar-footer {
            border-top: 0.8px solid var(--border-faint);
            padding: 16px 24px;
        }
        .logout-link {
            display: flex; align-items: center; gap: 10px;
            color: var(--amber);
            font-size: 14px;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .logout-link svg { width: 16px; height: 16px; }

        /* Main */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Topbar */
        .topbar {
            height: var(--topbar-h);
            background: rgba(249, 250, 252, 0.92);
            backdrop-filter: blur(18px);
            border-bottom: 0.8px solid var(--border);
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            transition: background 0.3s ease;
        }
        body.dark .topbar {
            background: rgba(11, 11, 20, 0.92);
        }

        .topbar h1 { font-size: 18px; font-weight: 600; }

        .topbar-right { display: flex; align-items: center; gap: 16px; }

        .notif { position: relative; cursor: pointer; }
        .notif svg { width: 20px; height: 20px; color: var(--text-muted); }
        .notif-dot {
            position: absolute; top: -3px; right: -2px;
            width: 9px; height: 9px;
            background: var(--red); border-radius: 50%;
        }

        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(180deg, var(--red), var(--orange));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; color: #ffffff;
            border: 1.5px solid rgba(255,255,255,0.7);
            cursor: pointer;
        }

        /* Theme Toggle Button in Topbar */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--red);
        }

        /* Content */
        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-icon {
            width: 44px; height: 44px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .stat-icon svg { width: 20px; height: 20px; }
        .stat-icon.cyan  { background: rgba(0,180,216,.08); color: var(--cyan); }
        .stat-icon.red   { background: rgba(230,57,70,.08); color: var(--red); }
        .stat-icon.green { background: rgba(43,147,72,.08); color: var(--green); }
        .stat-icon.amber { background: rgba(244,162,97,.08); color: var(--gold); }

        .stat-label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .pill {
            display: inline-block;
            font-size: 11px; font-weight: 600;
            padding: 2px 8px; border-radius: 999px;
        }
        .pill.green { background: rgba(43,147,72,.12); color: var(--green); }

        /* Next Trip Card */
        .next-trip-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-left: 4px solid var(--red);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            transition: background 0.3s ease;
        }

        .no-trip-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            text-align: center;
            color: var(--text-dim);
            font-size: 15px;
        }
        .no-trip-card strong { display: block; color: var(--text-muted); font-size: 17px; margin-bottom: 6px; }

        .trip-meta-label { font-size: 13px; color: var(--text-dim); letter-spacing: .5px; margin-bottom: 10px; }
        .trip-route { font-size: 22px; font-weight: 600; margin-bottom: 12px; }

        .trip-meta-row { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; margin-bottom: 14px; }
        .trip-meta-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-muted); }
        .trip-meta-item svg { width: 14px; height: 14px; flex-shrink: 0; }
        .trip-meta-item strong { color: var(--text); font-weight: 700; }

        .trip-status-row { display: flex; align-items: center; gap: 10px; }

        .status-pill {
            display: inline-block;
            font-size: 12px; font-weight: 600;
            padding: 4px 12px; border-radius: 999px;
        }
        .status-pill.amber  { background: rgba(244,162,97,.12); color: var(--gold); }
        .status-pill.green  { background: rgba(43,147,72,.12); color: var(--green); }
        .status-pill.red    { background: rgba(230,57,70,.12); color: var(--red); }
        .status-pill.gray   { background: rgba(107,114,128,.12); color: #6b7280; }

        .driver-text { font-size: 13px; color: var(--text-dim); }

        .track-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 22px;
            background: transparent;
            border: 1px solid var(--red);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 600;
            border-radius: 4px; cursor: pointer; white-space: nowrap;
            box-shadow: 0 0 4px rgba(230,57,70,.3), 0 0 8px rgba(230,57,70,.15);
            text-decoration: none;
            transition: box-shadow .2s;
            flex-shrink: 0;
        }
        .track-btn:hover { box-shadow: 0 0 8px rgba(230,57,70,.6), 0 0 14px rgba(230,57,70,.3); }
        .track-btn svg { width: 15px; height: 15px; color: var(--red); }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: background 0.3s ease;
        }

        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

        /* Bookings Table */
        .bookings-table { width: 100%; border-collapse: collapse; }
        .bookings-table th {
            text-align: left;
            font-size: 14px; font-weight: 500;
            color: var(--text-dim);
            padding-bottom: 12px;
        }
        .bookings-table td {
            font-size: 14px;
            padding: 12px 0;
            border-top: 0.8px solid var(--border-faint);
            vertical-align: middle;
        }
        .bookings-table td.date  { color: var(--text-muted); width: 110px; }
        .bookings-table td.seat  { color: var(--text-muted); width: 90px; }
        .bookings-table td.route { color: var(--text); }

        /* Quick Actions */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .action-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 22px 16px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: border-color .2s, transform .15s, background 0.3s ease;
        }
        .action-card:hover { border-color: rgba(230,57,70,.4); transform: translateY(-2px); }

        .action-icon {
            width: 44px; height: 44px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .action-icon svg { width: 20px; height: 20px; }
        .action-icon.red   { background: rgba(230,57,70,.08); color: var(--red); }
        .action-icon.cyan  { background: rgba(0,180,216,.08); color: var(--cyan); }
        .action-icon.green { background: rgba(43,147,72,.08); color: var(--green); }
        .action-icon.amber { background: rgba(244,162,97,.08); color: var(--gold); }

        .action-label { font-size: 14px; font-weight: 500; color: var(--text); text-align: center; }

        /* Routes Grid */
        .routes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .route-card {
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: transform .2s, background 0.3s ease;
        }
        .route-card:hover { transform: translateY(-2px); border-color: rgba(230,57,70,.3); }

        .route-code {
            font-size: 20px;
            font-weight: 700;
            color: var(--red);
            margin-bottom: 8px;
        }
        .route-path {
            font-size: 15px;
            color: var(--text);
            margin-bottom: 12px;
        }
        .route-time {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .btn-book {
            display: inline-block;
            padding: 8px 20px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .2s;
        }
        .btn-book:hover { opacity: 0.85; }

        .empty-row td {
            text-align: center;
            color: var(--text-dim);
            padding: 24px 0;
        }

        .filters-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .filters-bar input, .filters-bar select {
            padding: 10px 16px;
            background: var(--bg-card);
            border: 0.8px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }

        /* Emergency */
        .emergency-list {
            list-style: none;
            padding: 0;
        }
        .emergency-list li {
            padding: 12px;
            background: rgba(230,57,70,.1);
            margin-bottom: 10px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
        }
        body.dark .emergency-list li {
            background: rgba(255,71,87,.15);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .actions-grid { grid-template-columns: repeat(2, 1fr); }
            .topbar h1 { font-size: 14px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .actions-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-box">
            <img src="{% static 'app1/logo.png' %}" alt="logo" style="width:100%; height:100%; object-fit:contain;">
        </div>
        <span class="logo-text">Next Route</span>
    </div>

    <nav class="nav">
        <a href="{% url 'dashboard' %}">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <a href="{% url 'schedule' %}">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Schedule
        </a>
        <a href="{% url 'profile' %}">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profile
        </a>
    </nav>

    <div class="sidebar-footer">
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="logout-link">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </button>
        </form>
    </div>
</aside>

<main class="main">
    <header class="topbar">
        <h1>{% block topbar_title %}Dashboard{% endblock %}</h1>
        <div class="topbar-right">
            <div class="notif">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                <div class="notif-dot"></div>
            </div>
            <div class="theme-toggle" id="themeToggle">🌙</div>
            <div class="avatar">{{ request.user.first_name|first|upper }}</div>
        </div>
    </header>

    <div id="main-content" class="content">
        {% block content %}
        {% endblock %}
    </div>
</main>

<script>
    // ==========================================
    // THEME TOGGLE
    // ==========================================
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        body.classList.add('dark');
        themeToggle.textContent = '☀️';
    } else {
        themeToggle.textContent = '🌙';
    }

    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ==========================================
    // ✅ PROFILE PAGE: EVENT DELEGATION (FIXES EDIT & PASSWORD BUTTONS)
    // ==========================================
    function initProfileEvents() {
        // Edit Profile Button Click
        document.addEventListener('click', function(e) {
            if (e.target.id === 'editProfileBtn' || e.target.closest('#editProfileBtn')) {
                e.preventDefault();
                const profileCard = document.getElementById('profileCard');
                const editForm = document.getElementById('editFormCard');
                if (profileCard) profileCard.style.display = 'none';
                if (editForm) {
                    editForm.style.display = 'block';
                    editForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }

            // Cancel Button Click
            if (e.target.id === 'cancelEditBtn' || e.target.closest('#cancelEditBtn')) {
                e.preventDefault();
                const profileCard = document.getElementById('profileCard');
                const editForm = document.getElementById('editFormCard');
                if (editForm) editForm.style.display = 'none';
                if (profileCard) profileCard.style.display = 'flex';
            }
        });

        // Form Submit Handler with Event Delegation
        document.addEventListener('submit', function(e) {
            const form = e.target.closest('form');
            if (!form) return;

            const formId = form.id;
            if (['profileForm', 'passwordForm', 'renewForm'].includes(formId)) {
                e.preventDefault();

                const formData = new FormData(form);
                const actionUrl = form.action;

                fetch(actionUrl, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'X-CSRFToken': formData.get('csrfmiddlewaretoken') || getCookie('csrftoken')
                    }
                })
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const newContent = doc.getElementById('main-content');

                    if (newContent && document.getElementById('main-content')) {
                        document.getElementById('main-content').innerHTML = newContent.innerHTML;
                        // Re-initialize events for new content
                        setTimeout(() => initProfileEvents(), 100);
                    } else {
                        window.location.reload();
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Something went wrong. Please try again.');
                });
            }
        });
    }

    // Helper function to get CSRF token from cookie
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // ==========================================
    // ✅ SPA NAVIGATION (Your existing code + profile events)
    // ==========================================
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize profile events
        initProfileEvents();

        const navLinks = document.querySelectorAll('.nav a');
        const contentDiv = document.getElementById('main-content');

        async function loadPage(url, pushState = true) {
            try {
                contentDiv.innerHTML = '<div style="text-align:center; padding:40px;">Loading...</div>';
                const response = await fetch(url, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                if (!response.ok) throw new Error('Network error');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newContent = doc.getElementById('main-content');
                if (newContent) {
                    contentDiv.innerHTML = newContent.innerHTML;
                } else {
                    contentDiv.innerHTML = html;
                }
                if (pushState) {
                    history.pushState({ url: url }, '', url);
                }
                updateActiveLink(url);
                // Re-initialize profile events after AJAX load
                setTimeout(() => initProfileEvents(), 100);
            } catch (error) {
                console.error(error);
                contentDiv.innerHTML = '<p style="color:var(--red); text-align:center; padding:40px;">Failed to load page. Please refresh.</p>';
            }
        }

        function updateActiveLink(currentUrl) {
            const currentPath = new URL(currentUrl, window.location.origin).pathname;
            navLinks.forEach(link => {
                const linkPath = new URL(link.href, window.location.origin).pathname;
                if (linkPath === currentPath) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const url = this.href;
                loadPage(url, true);
            });
        });

        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.url) {
                loadPage(event.state.url, false);
            } else {
                loadPage(window.location.pathname, false);
            }
        });

        updateActiveLink(window.location.href);
    });
</script>
</body>
</html>
