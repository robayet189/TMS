{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Easy Transport</title>
    <style>
        :root, [data-theme="dark"] { --bg:#0f0f1a; --sidebar:#12121f; --card:#1c1c2e; --border:rgba(255,255,255,0.07); --text:#fff; --muted:#a09ab8; --accent:#ff4757; }
        [data-theme="light"] { --bg:#f8fafc; --sidebar:#fff; --card:#fff; --border:rgba(0,0,0,0.1); --text:#1e293b; --muted:#64748b; --accent:#ef4444; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family:sans-serif; display:flex; min-height:100vh; }
        .sidebar { width:260px; background:var(--sidebar); border-right:1px solid var(--border); padding:20px 0; position:fixed; height:100vh; }
        .logo { padding:0 20px 20px; border-bottom:1px solid var(--border); margin-bottom:10px; }
        .nav a { display:flex; align-items:center; gap:12px; padding:12px 20px; color:var(--muted); text-decoration:none; transition:0.2s; }
        .nav a:hover, .nav a.active { background:rgba(255,71,87,0.1); color:var(--accent); border-left:3px solid var(--accent); }
        .main { flex:1; margin-left:260px; padding:30px; }
        .theme-btn { position:absolute; top:20px; right:20px; background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; cursor:pointer; }
        .content-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-top:20px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><h2>🚌 Next Route</h2><small>Admin Panel</small></div>
        <nav class="nav">
            <a href="{% url 'admin_dashboard' %}" class="{% if active == 'overview' %}active{% endif %}">📊 Overview</a>
            <a href="{% url 'admin_users' %}" class="{% if active == 'users' %}active{% endif %}">👥 Users</a>
            <a href="{% url 'admin_fleet' %}" class="{% if active == 'fleet' %}active{% endif %}">🚍 Fleet</a>
            <a href="{% url 'admin_routes' %}" class="{% if active == 'routes' %}active{% endif %}">🗺️ Routes</a>
            <a href="{% url 'admin_bookings' %}" class="{% if active == 'bookings' %}active{% endif %}"> Bookings</a>
            <a href="{% url 'admin_revenue' %}" class="{% if active == 'revenue' %}active{% endif %}">💰 Revenue</a>
            <a href="{% url 'admin_alerts' %}" class="{% if active == 'alerts' %}active{% endif %}">🚨 Alerts</a>
            <a href="{% url 'logout' %}">🚪 Logout</a>
        </nav>
    </aside>

    <main class="main">
        <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
        {% block content %}{% endblock %}
    </main>

    <script>
        const html = document.documentElement;
        const saved = localStorage.getItem('admin_theme') || 'dark';
        html.setAttribute('data-theme', saved);
        function toggleTheme() {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('admin_theme', next);
        }
    </script>
</body>
</html>
