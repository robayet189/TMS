<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set New Password - Next Route</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=DM+Sans:opsz,wght@9..40,400;9..40,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(140.15deg, #0f0f1a 0%, #1a0a25 50%, #0a0f1f 100%);
    font-family: 'DM Sans', sans-serif;
  }
  .card {
    width: 520px;
    background: #1c1c2e;
    border-radius: 16px;
    padding: 32px;
  }
  h2 { color: white; text-align: center; margin-bottom: 20px; }
  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #2a2a3e;
    border: 1px solid #ff6b6b;
    border-radius: 8px;
    color: white;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #ff6b6b;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .alert { padding: 10px; border-radius: 8px; margin-bottom: 15px; }
  .alert-error { background: rgba(255,107,107,0.2); color: #ff6b6b; }
</style>
</head>
<body>
<div class="card">
  {% if valid %}
    <h2>Set New Password</h2>
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <input type="password" name="new_password" placeholder="New Password" required>
      <input type="password" name="confirm_password" placeholder="Confirm Password" required>
      <button type="submit">Reset Password</button>
    </form>
  {% else %}
    <h2>Invalid Link</h2>
    <p style="color:#a09ab8; text-align:center">This password reset link is invalid or expired.</p>
    <a href="{% url 'forgot_password' %}" style="display:block; text-align:center; color:#ff6b6b;">Request new link</a>
  {% endif %}
</div>
</body>
</html>
