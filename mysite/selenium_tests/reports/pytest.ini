[pytest]
# ========================================================================
# DJANGO CONFIGURATION - CRITICAL
# ========================================================================
# Tells pytest-django which settings module to use
# Must match your Django project's settings file path
DJANGO_SETTINGS_MODULE = mysite.settings

# Enable pytest-django plugin explicitly (optional but recommended)
django_find_project = false

# ========================================================================
# TEST DISCOVERY SETTINGS
# ========================================================================
# Files that contain tests (pattern matching)
python_files = tests/*.py

# Class names that contain tests
python_classes = Test*

# Function names that are tests
python_functions = test_*

# Directories to search for tests
testpaths = tests

# ========================================================================
# OUTPUT AND REPORTING OPTIONS
# ========================================================================
# --html: Generate HTML report at specified path
# --self-contained-html: Embed all CSS/JS in single HTML file
# -v: Verbose output showing each test name
# --tb=short: Short traceback format for errors
# -s: Disable output capturing (show print statements)
# --base-url: Base URL for tests (used by page objects)
addopts = 
    --html=reports/booking_test.html
    --self-contained-html
    -v
    --tb=short
    -s
    --base-url=http://127.0.0.1:8000

# ========================================================================
# WARNING FILTERS - Suppress non-critical warnings
# ========================================================================
# Ignore deprecation warnings from third-party packages
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Ignore RuntimeWarning about model reloading (common with pytest-django)
    ignore::RuntimeWarning
    # Ignore specific Django model registration warnings
    ignore:Model.*was already registered:RuntimeWarning
    # Ignore urllib3 SSL warnings in development
    ignore:Unverified HTTPS request