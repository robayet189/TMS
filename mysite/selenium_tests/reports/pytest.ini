[pytest]
# ✅ CRITICAL: Django settings module
DJANGO_SETTINGS_MODULE = mysite.settings

# Django pytest plugin configuration
python_files = tests/*.py
python_classes = Test*
python_functions = test_*

# Test discovery
testpaths = tests

# Output and reporting
addopts = 
    --html=reports/booking_test.html
    --self-contained-html
    -v
    --tb=short
    -s
    --base-url=http://127.0.0.1:8000

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning