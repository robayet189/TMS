[pytest]
# ========================================================================
# DJANGO CONFIGURATION - CRITICAL
# ========================================================================
# ✅ Tells pytest-django which settings module to use
# Must match your Django project's settings file path
DJANGO_SETTINGS_MODULE = mysite.settings

# ========================================================================
# TEST DISCOVERY SETTINGS
# ========================================================================
# Files that contain tests
python_files = tests/*.py

# Class names that contain tests
python_classes = Test*

# Function names that are tests
python_functions = test_*

# Directories to search for tests
testpaths = tests

# ========================================================================
# OUTPUT AND REPORTING OPTIONS
# ========================================================================
addopts = 
    # Generate HTML report
    --html=reports/booking_test.html
    # Embed all resources in single HTML file
    --self-contained-html
    # Verbose output
    -v
    # Short traceback format
    --tb=short
    # Disable output capturing (show print statements)
    -s
    # Base URL for tests (used by page objects)
    --base-url=http://127.0.0.1:8000

# ========================================================================
# WARNING FILTERS - Suppress non-critical warnings
# ========================================================================
filterwarnings =
    # Ignore deprecation warnings from third-party packages
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Ignore RuntimeWarning about model reloading (common with pytest-django)
    ignore::RuntimeWarning
    # Ignore specific Django warnings
    ignore:Model.*was already registered:RuntimeWarning