[pytest]
addopts = 
    -v
    --html=reports/test_report.html
    --self-contained-html
    -rs
    --tb=short
    --maxfail=5

testpaths = 
    tests

python_files = 
    test_*.py

python_classes = 
    Test*

python_functions = 
    test_*

markers =
    smoke: marks tests as smoke tests
    regression: marks tests as regression tests
    admin: marks tests as admin tests
    user: marks tests as user tests